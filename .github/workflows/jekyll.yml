name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main]
    # Skip if commit is from resume update
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Test built site
        run: |
          # Basic validation
          test -f _site/index.html
          test -f _site/readme/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-profile:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: mhanyu/mhanyu
          ref: main
          token: ${{ secrets.API_TOKEN_GITHUB }}

      - name: Update README
        run: |
          curl -f -o README.md.new https://mhanyu.github.io/readme
          if ! cmp -s README.md README.md.new; then
            mv README.md.new README.md
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m ":bento: update README from portfolio site"
            git push
          else
            rm README.md.new
          fi
